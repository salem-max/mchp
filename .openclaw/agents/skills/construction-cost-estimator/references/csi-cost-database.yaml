# CSI MasterFormat Construction Cost Database
# Base $/SF ranges by division, asset type, construction type, and finish level
# Source: National averages based on 2024-2025 RSMeans, ENR, and institutional project data
# These are pre-regional-adjustment figures. Apply regional cost factors before use.
#
# Usage: Look up division -> asset_type -> construction_type -> finish_level
# All values in USD per gross square foot unless noted otherwise

metadata:
  version: "2025.1"
  baseline_year: 2024
  baseline_quarter: Q4
  cost_index_source: "RSMeans national average, ENR BCI"
  notes: >
    Ranges represent the 25th to 75th percentile of observed project costs.
    Actual costs will vary based on project-specific conditions, subcontractor
    availability, procurement strategy, and market timing. Use as order-of-magnitude
    guidance for conceptual and schematic design phase estimates.

