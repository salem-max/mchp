# Regional Construction Cost Factors
# Multipliers applied to national-average base costs to produce local market estimates
# Source: RSMeans City Cost Index, ENR Construction Cost Index, 2024-2025 data
# National baseline = 1.00
#
# Factor interpretation:
#   < 1.00 = below national average (lower cost market)
#   = 1.00 = at national average
#   > 1.00 = above national average (higher cost market)
#
# Factors incorporate labor rates, material delivery costs, productivity norms,
# and general regulatory environment. They do NOT separately account for:
#   - Union vs. open-shop differentials (apply separately if needed)
#   - Prevailing wage premiums (apply separately)
#   - Seismic or extreme climate premiums (apply separately)

metadata:
  version: "2025.1"
  baseline_year: 2024
  baseline_quarter: Q4
  source: "RSMeans City Cost Index, ENR BCI, institutional project data"
  national_baseline: 1.00
  notes: >
    Factors represent the overall cost index relative to the national average.
    For cities not listed, interpolate from the nearest metro area or use the
    state-level average. Factors change over time as local labor markets,
    material supply chains, and regulatory environments evolve. Re-validate
    annually or when market conditions shift significantly.

