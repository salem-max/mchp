pack_slug: change_order_review
pack_type: workflow
priority: 20
triggers:
  explicit_phrases:
    - "change order"
    - "CO review"
    - "PCO"
    - "scope change"
    - "contract change"
  implicit_signals:
    - "GC submitted a PCO"
    - "owner requested scope change"
    - "RFI produced cost impact"
required_axes:
  - asset_class
  - segment
  - form_factor
  - market
  - project_id
optional_axes:
  - role
  - lifecycle_stage
  - output_type
fallback_behavior:
  missing_required_axis: ask_user
  missing_optional_axis: proceed_with_default
