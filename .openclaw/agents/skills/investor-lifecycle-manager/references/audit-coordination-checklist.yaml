---
# DOCUMENT REQUEST TRACKING TEMPLATE

tracking_template:
  columns:
    - field: "id"
      description: "PBC item identifier"
    - field: "category"
      description: "FS, CA, FE, VA, DE, LE, TX"
    - field: "item_description"
      description: "What is being requested"
    - field: "priority"
      description: "Critical, High, Medium"
    - field: "owner"
      description: "Person responsible for producing"
    - field: "due_date"
      description: "Target delivery date to auditor"
    - field: "status"
      values:
        - "not_started"
        - "in_progress"
        - "under_review"
        - "delivered"
        - "auditor_follow_up"
        - "complete"
    - field: "date_delivered"
      description: "Actual delivery date"
    - field: "auditor_notes"
      description: "Any follow-up questions or issues"
    - field: "resolution_date"
      description: "Date follow-up items resolved"

  summary_metrics:
    total_items: 42
    by_priority:
      critical: 12
      high: 22
      medium: 8
    by_category:
      financial_statements: 10
      capital_accounts: 7
      fee_calculations: 5
      valuations: 7
      debt_schedule: 5
      legal: 8
      tax: 6

---
# COMMON AUDITOR ADJUSTMENTS TO WATCH FOR

common_adjustments:
  - area: "Straight-line rent"
    issue: "Incorrect calculation of free rent periods, tenant improvement amortization, or lease term"
    prevention: "Reconcile SLR schedule to lease abstracts quarterly"

  - area: "Fair value of derivatives"
    issue: "Interest rate swaps/caps not marked to market at period end"
    prevention: "Obtain counterparty valuations monthly; reconcile to third-party pricing service"

  - area: "Impairment"
    issue: "Properties with undiscounted cash flows below carrying value not tested for impairment"
    prevention: "Screen portfolio quarterly for impairment indicators; document analysis"

  - area: "Acquisition cost allocation"
    issue: "Incorrect allocation between land, building, in-place leases, above/below market leases"
    prevention: "Engage third-party to prepare purchase price allocation within 90 days of closing"

  - area: "Related party transactions"
    issue: "Undisclosed or improperly disclosed related party transactions"
    prevention: "Maintain related party registry; require disclosure for all transactions"

  - area: "Subsequent events"
    issue: "Material events between year-end and opinion date not properly disclosed"
    prevention: "Run subsequent events checklist at each fieldwork date and opinion date"
