# Annual Fund Audit PBC (Prepared by Client) Checklist
# Organized by category with typical auditor timeline

---
audit_metadata:
  document: "Annual Fund Audit PBC Checklist"
  applicable_to: "Closed-end and open-end CRE investment funds"
  auditor_engagement: "Big 4 or national firm with real estate fund practice"
  fiscal_year_end: "December 31"
  target_opinion_date: "March 31 (90 days post FYE)"

---
# AUDITOR TIMELINE
timeline:
  - milestone: "Engagement letter execution"
    target_date: "October 15 (T-75 days)"
    notes: "Confirm scope, fees, team. Include any new entities or structures."

  - milestone: "Planning meeting"
    target_date: "November 1 (T-60 days)"
    notes: "Discuss significant transactions, new accounting standards, key estimates."

  - milestone: "Interim fieldwork"
    target_date: "November 15-30"
    notes: "Test controls, walk-throughs, preliminary analytics. Provide interim PBC items."

  - milestone: "Year-end close"
    target_date: "January 15 (T+15 days)"
    notes: "Complete close process. All December entries posted."

  - milestone: "PBC delivery - Phase 1 (financials)"
    target_date: "January 25 (T+25 days)"
    notes: "Trial balance, financial statement drafts, supporting schedules."

  - milestone: "PBC delivery - Phase 2 (legal, tax, valuations)"
    target_date: "February 5 (T+35 days)"
    notes: "Legal confirmations, tax workpapers, final appraisals."

  - milestone: "Final fieldwork"
    target_date: "February 10-28"
    notes: "Substantive testing, confirmation follow-up, subsequent events review."

  - milestone: "Draft financial statements review"
    target_date: "March 5 (T+65 days)"
    notes: "Review auditor draft FS and footnotes. Provide comments within 5 business days."

  - milestone: "Management representation letter"
    target_date: "March 20 (T+80 days)"
    notes: "Review, execute, and return to auditor."

  - milestone: "Signed opinion"
    target_date: "March 31 (T+90 days)"
    notes: "Final signed audit opinion delivered. Distribute to LPs per LPA requirements."

