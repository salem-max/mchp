# Building Inspection Checklists
# Complete checklists for daily, weekly, monthly, quarterly, and annual inspections
# Baseline: 200-unit Class B multifamily, built 2008, ASHRAE Zone 4A
# Last updated: 2026-03-17

---

# Daily Building Walk-Through (25 items)
# Duration: 45-60 minutes
# Performed by: on-site maintenance technician or property manager
daily_walk_through:
  header:
    property: ""
    date: ""
    inspector: ""
    weather: ""
    temperature_high: 0
    temperature_low: 0

  exterior:
    - id: DW-01
      item: "Building entrance doors close and latch properly"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- security concern if entry doors don't latch"

    - id: DW-02
      item: "Exterior lighting operational (all fixtures)"
      pass_fail: ""
      notes: ""
      escalation: "Routine -- replace within 48 hours. Emergency if parking area dark."

    - id: DW-03
      item: "Parking lot and sidewalks clear of debris and hazards"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if trip hazard. Routine for debris."

    - id: DW-04
      item: "Dumpster area clean, gates closed, no overflow"
      pass_fail: ""
      notes: ""
      escalation: "Routine. Call hauler if overflow."

    - id: DW-05
      item: "Landscaping irrigation not leaking or flooding"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if active leak. Routine for minor adjustment."

    - id: DW-06
      item: "Building signage and address numbers intact"
      pass_fail: ""
      notes: ""
      escalation: "Scheduled. Fire code requires visible address."

    - id: DW-07
      item: "No visible graffiti, vandalism, or property damage"
      pass_fail: ""
      notes: ""
      escalation: "Routine. Remove graffiti within 24-48 hours."

  lobby_common_areas:
    - id: DW-08
      item: "Lobby clean, well-lit, and presentable"
      pass_fail: ""
      notes: ""
      escalation: "Routine."

    - id: DW-09
      item: "Mailbox area secure and functional"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if mailboxes compromised."

    - id: DW-10
      item: "Elevator operating normally (ride both cabs)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if any cab out of service."

    - id: DW-11
      item: "Stairwells clean, well-lit, doors closing properly"
      pass_fail: ""
      notes: ""
      escalation: "Emergency if stairwell doors not latching (fire code)."

    - id: DW-12
      item: "Common area HVAC functioning (temperature comfortable)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent in extreme weather. Routine otherwise."

    - id: DW-13
      item: "Laundry room equipment operational and clean"
      pass_fail: ""
      notes: ""
      escalation: "Routine. Track out-of-service machines."

    - id: DW-14
      item: "Fitness center / amenity spaces clean and equipment functional"
      pass_fail: ""
      notes: ""
      escalation: "Routine."

  mechanical_utility:
    - id: DW-15
      item: "Mechanical rooms locked and accessible only to authorized personnel"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if unlocked. Security and code violation."

    - id: DW-16
      item: "No unusual noises, vibrations, or odors from mechanical equipment"
      pass_fail: ""
      notes: ""
      escalation: "Varies. Gas odor = Emergency (evacuate, call gas company)."

    - id: DW-17
      item: "No water leaks or standing water in mechanical rooms"
      pass_fail: ""
      notes: ""
      escalation: "Urgent. Identify source immediately."

    - id: DW-18
      item: "Sump pumps operational (test if equipped)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent. Failure leads to flooding."

    - id: DW-19
      item: "Water heater temperature and pressure normal"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if temperature > 140F at tap (scald risk)."

  safety:
    - id: DW-20
      item: "Fire alarm panel: no trouble or supervisory conditions"
      pass_fail: ""
      notes: ""
      escalation: "Emergency. Any trouble condition requires immediate investigation."

    - id: DW-21
      item: "Emergency exits clear and unobstructed"
      pass_fail: ""
      notes: ""
      escalation: "Emergency. Fire code violation. Clear immediately."

    - id: DW-22
      item: "Exit signs illuminated"
      pass_fail: ""
      notes: ""
      escalation: "Urgent. Replace within 24 hours."

    - id: DW-23
      item: "Fire extinguishers in place with current inspection tags"
      pass_fail: ""
      notes: ""
      escalation: "Routine if present but tag expired. Emergency if missing."

    - id: DW-24
      item: "AED (automated external defibrillator) in place and indicator green"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if indicator not green (battery or pad issue)."

    - id: DW-25
      item: "Slip/trip hazards identified and addressed"
      pass_fail: ""
      notes: ""
      escalation: "Urgent. Liability risk. Cone/barricade immediately, repair within 24 hours."

  summary:
    total_items: 25
    pass: 0
    fail: 0
    work_orders_generated: 0
    notes: ""

---

# Weekly Life Safety Check (15 items)
# Duration: 30-45 minutes
# Performed by: on-site maintenance technician
weekly_life_safety:
  header:
    property: ""
    week_of: ""
    inspector: ""

  fire_alarm:
    - id: WLS-01
      item: "Fire alarm control panel -- normal condition, no trouble lights"
      pass_fail: ""
      notes: ""
      escalation: "Emergency if trouble condition active"

    - id: WLS-02
      item: "Fire alarm communicator -- verify connection to monitoring center"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- building unmonitored"

    - id: WLS-03
      item: "Sprinkler system -- main valve open and supervised"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- sprinkler system impaired"

    - id: WLS-04
      item: "Sprinkler system -- gauges within normal range"
      pass_fail: ""
      notes: ""
      normal_ranges:
        system_pressure: "150-175 PSI (typical residential)"
        air_pressure_dry: "per system design (typically 40 PSI)"

    - id: WLS-05
      item: "Fire pump -- run test (where equipped)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent if pump fails to start or low pressure"

  egress:
    - id: WLS-06
      item: "All stairwell doors close and latch (walk each stairwell)"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- compromised fire separation"

    - id: WLS-07
      item: "Emergency lighting -- activate test button (30-second test)"
      pass_fail: ""
      notes: ""
      units_tested: 0
      units_failed: 0
      escalation: "Urgent -- replace batteries within 48 hours"

    - id: WLS-08
      item: "Exit signs -- all illuminated (walk every floor)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- code requires all exit signs operational"

    - id: WLS-09
      item: "No storage or obstructions in stairwells or exit paths"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- clear immediately"

  elevator_safety:
    - id: WLS-10
      item: "Elevator emergency phone test (each cab)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- code requires functional emergency communication"

    - id: WLS-11
      item: "Elevator door reopening device functional (safety edge/photo eye)"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- safety hazard"

  carbon_monoxide:
    - id: WLS-12
      item: "CO detectors operational (common areas with gas equipment)"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- life safety hazard"

  security:
    - id: WLS-13
      item: "Security cameras operational (spot check 5 cameras)"
      pass_fail: ""
      cameras_checked: ""
      notes: ""
      escalation: "Urgent -- liability exposure"

    - id: WLS-14
      item: "Access control system functioning (test 3 doors)"
      pass_fail: ""
      doors_tested: ""
      notes: ""
      escalation: "Urgent if exterior doors affected"

    - id: WLS-15
      item: "Emergency generator -- verify auto-start battery charged, block heater on"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- generator may fail to start in power outage"

  summary:
    total_items: 15
    pass: 0
    fail: 0
    work_orders_generated: 0

