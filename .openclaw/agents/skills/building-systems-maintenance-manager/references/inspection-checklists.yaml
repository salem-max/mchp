# Monthly Mechanical Room Inspection (20 items)
# Duration: 60-90 minutes
# Performed by: chief engineer or qualified HVAC technician
monthly_mechanical:
  header:
    property: ""
    month: ""
    inspector: ""

  boiler_room:
    - id: MMR-01
      item: "Boiler operating pressure and temperature within normal range"
      pass_fail: ""
      readings:
        boiler_1_pressure: ""
        boiler_1_temp: ""
        boiler_2_pressure: ""
        boiler_2_temp: ""
      normal_range: "Pressure: 12-15 PSI, Temperature: 160-180F supply"

    - id: MMR-02
      item: "Combustion air louvers open and unobstructed"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- incomplete combustion, CO risk"

    - id: MMR-03
      item: "Gas piping -- no odor, no visible corrosion, drip legs drained"
      pass_fail: ""
      notes: ""
      escalation: "Emergency if gas odor detected"

    - id: MMR-04
      item: "Flue connections tight, no exhaust leaks"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- CO risk"

    - id: MMR-05
      item: "Expansion tank pressure correct"
      pass_fail: ""
      reading: ""
      target: ""
      notes: ""

  pump_room:
    - id: MMR-06
      item: "Domestic water booster pumps -- pressure and flow normal"
      pass_fail: ""
      reading: ""
      notes: ""

    - id: MMR-07
      item: "Pump seals -- no leaks"
      pass_fail: ""
      notes: ""
      escalation: "Routine if minor weep. Urgent if active drip."

    - id: MMR-08
      item: "Pump motor temperature and amp draw"
      pass_fail: ""
      readings:
        pump_1_amps: ""
        pump_1_nameplate: ""
        pump_2_amps: ""
        pump_2_nameplate: ""
      note: "Amps > 110% of nameplate indicates overload"

    - id: MMR-09
      item: "Hot water heater/storage -- temperature, anode rod condition"
      pass_fail: ""
      temperature: ""
      target: "120-125F at tap, 140F at storage with mixing valve"

  electrical_room:
    - id: MMR-10
      item: "Electrical panels -- no signs of overheating (discoloration, smell)"
      pass_fail: ""
      notes: ""
      escalation: "Emergency if evidence of overheating"

    - id: MMR-11
      item: "Panel breakers properly labeled"
      pass_fail: ""
      notes: ""

    - id: MMR-12
      item: "36-inch clearance maintained in front of all panels"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- NEC requirement"

    - id: MMR-13
      item: "No unauthorized extension cords or power strips"
      pass_fail: ""
      notes: ""

  emergency_generator:
    - id: MMR-14
      item: "Generator monthly run test (30 minutes under load)"
      pass_fail: ""
      run_time_minutes: 0
      load_kw: 0
      fuel_level_percent: 0
      notes: ""
      escalation: "Urgent if generator fails to start or run"

    - id: MMR-15
      item: "Generator coolant level and battery voltage"
      pass_fail: ""
      coolant_level: ""
      battery_voltage: ""
      target_voltage: "24V DC minimum"

    - id: MMR-16
      item: "Automatic transfer switch -- exercise and test"
      pass_fail: ""
      notes: ""
      escalation: "Urgent -- building has no backup power if ATS fails"

  cooling_tower_seasonal:
    - id: MMR-17
      item: "Cooling tower basin -- clean, water treatment current"
      pass_fail: ""
      notes: ""
      seasonal: "April through October (cooling season)"

    - id: MMR-18
      item: "Cooling tower water chemistry test results"
      pass_fail: ""
      readings:
        conductivity: ""
        pH: ""
        hardness: ""
        bacteria: ""
      note: "Per water treatment vendor program targets"

  general:
    - id: MMR-19
      item: "All mechanical rooms clean, organized, no storage of non-mechanical items"
      pass_fail: ""
      notes: ""

    - id: MMR-20
      item: "MSDS/SDS binder current and accessible"
      pass_fail: ""
      notes: ""
      escalation: "Routine -- OSHA requirement"

  summary:
    total_items: 20
    pass: 0
    fail: 0
    work_orders_generated: 0

