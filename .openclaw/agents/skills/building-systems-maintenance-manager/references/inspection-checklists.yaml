# Quarterly Elevator Audit (12 items)
# Duration: 2-3 hours (both cabs)
# Performed by: property manager + elevator consultant (or qualified in-house)
quarterly_elevator_audit:
  header:
    property: ""
    quarter: ""
    inspector: ""
    elevator_vendor: ""
    contract_type: ""  # full_service, oil_and_grease, PM_only

  performance_metrics:
    - id: QEA-01
      item: "Callback log review (callbacks per unit this quarter)"
      data:
        cab_1_callbacks: 0
        cab_2_callbacks: 0
        target: "< 9 per unit per quarter (< 3/month)"
      pass_fail: ""
      notes: ""

    - id: QEA-02
      item: "Entrapment log review (entrapments per unit this quarter)"
      data:
        cab_1_entrapments: 0
        cab_2_entrapments: 0
        target: "0 (any entrapment requires incident review)"
      pass_fail: ""
      notes: ""

    - id: QEA-03
      item: "Out-of-service hours this quarter"
      data:
        cab_1_hours: 0
        cab_2_hours: 0
        target: "< 8 hours per unit per quarter (99.6% uptime)"
      pass_fail: ""
      notes: ""

  physical_inspection:
    - id: QEA-04
      item: "Cab interior condition (walls, ceiling, floor, lighting)"
      condition_score: 0  # 1-5
      notes: ""

    - id: QEA-05
      item: "Door operation -- smooth, proper speed, no banging"
      pass_fail: ""
      door_open_time_sec: 0
      door_close_time_sec: 0
      target: "Open: 1.5-3.0 sec. Close: 3.0-4.0 sec. (ADA compliant)"

    - id: QEA-06
      item: "Ride quality -- smooth acceleration, deceleration, leveling"
      pass_fail: ""
      leveling_accuracy_inches: 0
      target: "Within 1/2 inch of landing (ADA requirement)"

    - id: QEA-07
      item: "Machine room -- clean, temperature controlled, no oil leaks"
      pass_fail: ""
      room_temp_f: 0
      target: "Room temperature: 55-100F per ASME A17.1"

  safety_testing:
    - id: QEA-08
      item: "Fire recall test -- Phase I (lobby recall from each floor)"
      pass_fail: ""
      notes: ""
      escalation: "Emergency -- fire recall is life safety critical"

    - id: QEA-09
      item: "Fire recall test -- Phase II (in-car firefighter operation)"
      pass_fail: ""
      notes: ""

    - id: QEA-10
      item: "Door reopening devices -- safety edge and/or photo eye"
      pass_fail: ""
      notes: ""

    - id: QEA-11
      item: "Emergency phone test -- connection to monitoring center"
      pass_fail: ""
      notes: ""

    - id: QEA-12
      item: "Hoistway door interlocks -- doors will not open unless cab is at landing"
      pass_fail: ""
      floors_tested: ""
      notes: ""
      escalation: "Emergency -- interlock failure is immediate safety hazard"

  vendor_performance_scorecard:
    response_time_avg_minutes: 0
    target_response_minutes: 60
    pm_visits_completed: 0
    pm_visits_scheduled: 0
    parts_on_backorder: []
    contract_compliance_issues: []
    overall_grade: ""  # A, B, C, D, F

  summary:
    total_items: 12
    pass: 0
    fail: 0
    action_items: []

