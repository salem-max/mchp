    - id: PLM-03
      item: "Domestic water pressure test passed"
    - id: PLM-04
      item: "Sanitary sewer camera inspection complete (main lines)"
    - id: PLM-05
      item: "Gas piping pressure test passed, meter installed"
    - id: PLM-06
      item: "Backflow preventers installed, tested, and tagged"

  fire_protection:
