# =============================================================================
# SECTION 3: PUNCH LIST MANAGEMENT WORKFLOW
# =============================================================================

punch_list_workflow:
  step_1_creation:
    trigger: "Substantial completion walkthrough"
    participants:
      - "Owner's representative"
      - "Architect"
      - "GC superintendent"
      - "GC PM"
      - "Property manager (if identified)"
    process:
      - "Systematic walkthrough by area and system"
      - "Document each item with location, description, photo"
      - "Assign responsible subcontractor"
      - "Set priority: critical (safety/code), major (function), minor (cosmetic)"
      - "Compile into numbered punch list document"
    deliverable: "Numbered punch list with photos, sorted by trade"

  step_2_assignment:
    timeline: "Within 3 business days of walkthrough"
    process:
      - "GC distributes punch items to responsible subcontractors"
      - "Each sub acknowledges receipt and provides completion timeline"
      - "GC compiles schedule and submits to owner"
      - "Owner approves schedule or requests acceleration"
    deliverable: "Punch list completion schedule by trade"

  step_3_completion:
    timeline: "Per approved schedule, typically 30-45 days"
    process:
      - "Subs perform corrective work"
      - "GC superintendent verifies each item"
      - "GC marks items complete in tracking system"
      - "Weekly progress reports to owner"
    deliverable: "Weekly punch list progress report"

  step_4_verification:
    timeline: "Within 7 days of GC reporting completion"
    process:
      - "Owner's representative re-inspects each completed item"
      - "Items verified as complete are signed off"
      - "Items not acceptable are returned to GC with comments"
      - "Second round punch items have 14-day completion deadline"
    deliverable: "Verified punch list with sign-offs"

  step_5_signoff:
    trigger: "All punch items verified complete or accepted with holdback"
    process:
      - "Owner signs punch list acceptance letter"
      - "Final completion date established"
      - "Retainage release processed per contract terms"
      - "Warranty periods commence from substantial completion (not final)"
    deliverable: "Punch list acceptance letter, retainage release authorization"

# =============================================================================
# SECTION 4: WARRANTY TRACKING
# =============================================================================

warranty_tracking:
  standard_warranties:
    general:
      duration: "1 year from substantial completion"
      covers: "General workmanship and materials"
      responsible: "General contractor"
      action_at_11_months: "Conduct 11-month warranty walkthrough"

    mechanical_hvac:
      duration: "2 years from substantial completion"
      covers: "HVAC equipment, controls, ductwork"
      responsible: "Mechanical subcontractor"
      notes: "Manufacturer warranty may extend beyond sub warranty"
      action_items:
        - "Register all equipment warranties with manufacturers"
        - "Maintain service records to preserve warranty"
        - "Schedule 23-month walkthrough"

    structural:
      duration: "10 years from substantial completion"
      covers: "Structural defects in foundation, framing, load-bearing elements"
      responsible: "General contractor / structural sub"
      notes: "Varies by state statute -- check local requirements"

    roofing:
      manufacturer_warranty:
        duration: "20-30 years (NDL -- No Dollar Limit)"
        covers: "Material defects, may include labor for first 10 years"
        requirements:
          - "Must use manufacturer-approved installer"
          - "Must register warranty within 60 days of completion"
          - "Maintain per manufacturer's maintenance requirements"
          - "Annual roof inspections by approved inspector"
      installer_warranty:
        duration: "2-5 years"
        covers: "Workmanship and installation defects"

    waterproofing:
      duration: "5-10 years"
      covers: "Below-grade waterproofing, plaza deck, balconies"
      responsible: "Waterproofing subcontractor"
      notes: "Manufacturer warranty separate from installer"

    windows_curtain_wall:
      duration: "5-10 years (glass seal), 2 years (hardware)"
      covers: "Seal failure (fogging), water infiltration, hardware operation"
      responsible: "Glazing subcontractor / manufacturer"

    elevator:
      duration: "1 year (installation), maintenance contract required"
      covers: "Installation defects, equipment malfunction"
      responsible: "Elevator contractor"
      notes: "Transition to maintenance contract before warranty expires"

    appliances:
      duration: "1-2 years per manufacturer"
      covers: "Manufacturing defects"
      responsible: "Manufacturer (direct)"
      notes: "Register all serial numbers, maintain purchase records"

    paint_finishes:
      duration: "1 year (workmanship)"
      covers: "Peeling, blistering, color inconsistency"
      responsible: "Painting subcontractor"
      notes: "Touch-up kits and color formulas should be provided at closeout"

    flooring:
      duration: "1 year workmanship, manufacturer varies"
      covers: "Installation defects, seam failure, material defects"
      responsible: "Flooring subcontractor / manufacturer"

  warranty_management_process:
    month_1:
      - "Compile master warranty log with all start/end dates"
      - "File all manufacturer warranty certificates"
      - "Distribute warranty contact list to property management"
      - "Set calendar reminders for key warranty expirations"

    month_6:
      - "6-month review of any warranty claims filed"
      - "Check seasonal systems not tested at completion (heating if summer CO, cooling if winter CO)"

    month_11:
      - "Conduct comprehensive 11-month warranty walkthrough"
      - "Document all deficiencies by system"
      - "Submit warranty claim to GC with 30-day cure period"
      - "Focus areas: HVAC performance, envelope leaks, finish defects"

    month_23:
      - "Conduct mechanical warranty walkthrough before 2-year expiration"
      - "Document any HVAC, plumbing, or controls issues"
      - "Submit claims to mechanical subcontractor"

    annually:
      - "Roof inspection per manufacturer requirements"
      - "Update warranty log for any claims resolved or pending"
      - "Review upcoming warranty expirations (90-day advance notice)"

  warranty_claim_process:
    step_1: "Document deficiency with photos, location, and description"
    step_2: "Submit written notice to GC per contract warranty provisions"
    step_3: "GC has 7 days to acknowledge and 30 days to cure (typical)"
    step_4: "If GC fails to cure, owner may cure and back-charge against retainage or bond"
    step_5: "For manufacturer warranties, file directly with manufacturer if installer is unresponsive"
    step_6: "Maintain log of all claims, status, and resolution"
