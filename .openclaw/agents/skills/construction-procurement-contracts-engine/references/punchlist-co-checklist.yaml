# Punch List & Change Order Checklist
# Construction Procurement & Contracts Engine Reference
# Organized by building system with warranty tracking

---
# =============================================================================
# SECTION 1: PRE-CHANGE ORDER CHECKLIST
# =============================================================================

change_order_review:
  entitlement_check:
    - item: "Verify CO cause category"
      categories:
        - owner_directed_change
        - unforeseen_condition
        - design_error_or_omission
        - regulatory_or_code_change
        - force_majeure
        - differing_site_condition
    - item: "Confirm contractual entitlement exists for claimed cause"
    - item: "Verify notice was provided per contract (typically 7-21 days)"
    - item: "Check if work was authorized before CO approval (if so, note procedural violation)"
    - item: "Determine if change is additive, deductive, or time-only"

  cost_review:
    labor:
      - item: "Verify labor rates match contract scheduled rates"
      - item: "Check crew size is reasonable for scope"
      - item: "Verify hours are reasonable (compare to RS Means or estimator)"
      - item: "Confirm overtime is justified and pre-approved"
      - item: "Check for labor burden rate accuracy (typically 35-55% of base wage)"
    material:
      - item: "Verify material quantities against takeoff"
      - item: "Check unit prices against supplier quotes (minimum 2 quotes)"
      - item: "Confirm material specification matches contract requirements"
      - item: "Verify sales tax rate is correct for jurisdiction"
      - item: "Check for material waste factor (typically 5-10%, not 15-20%)"
    equipment:
      - item: "Verify equipment rates against AED Green Book or contract rates"
      - item: "Check rental vs owned equipment rate appropriateness"
      - item: "Confirm equipment is necessary for this scope (not already on site)"
      - item: "Verify mobilization/demobilization charges if applicable"
    subcontractor:
      - item: "Review sub's detailed breakdown (same rigor as GC)"
      - item: "Verify sub markup is per contract (typically 10-15% OH&P)"
      - item: "Confirm GC markup on sub work is per contract (typically 5-10%)"
      - item: "NO markup on markup -- GC marks up sub's base cost only"
      - item: "Check for duplicate general conditions charges"
    general:
      - item: "Verify no contingency markup on CO work"
      - item: "Check bond premium adjustment if applicable"
      - item: "Verify insurance cost adjustment if applicable"
      - item: "Confirm GC fee applies only to cost of work, not other markups"
      - item: "Total markup stack should not exceed 20-25% on sub work"

  schedule_impact:
    - item: "Determine if CO work is on critical path"
    - item: "Review CPM schedule update showing impact"
    - item: "Check for concurrent delay (owner delay + contractor delay)"
    - item: "Verify float consumption is legitimate"
    - item: "Assess if CO work can be sequenced to avoid delay"
    - item: "Calculate LD exposure if schedule extends"
    - item: "Document weather days and force majeure separately"

  documentation_required:
    - item: "Written description of changed work"
    - item: "Detailed cost breakdown with backup"
    - item: "Minimum 2 subcontractor/supplier quotes for material"
    - item: "CPM schedule fragment showing impact"
    - item: "Photos of existing conditions (for unforeseen conditions)"
    - item: "Reference to contract clause supporting entitlement"
    - item: "Architect/engineer direction or confirmation"
    - item: "RFI response that triggered the change (if applicable)"

# =============================================================================
# SECTION 2: PUNCH LIST BY BUILDING SYSTEM (50+ items)
# =============================================================================

punch_list_by_system:

