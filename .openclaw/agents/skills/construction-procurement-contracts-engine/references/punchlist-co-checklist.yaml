      item: "Sprinkler system hydrostatic test passed"
    - id: FP-02
      item: "Fire pump tested -- flow and pressure per design"
    - id: FP-03
      item: "Standpipe system tested and operational"
    - id: FP-04
      item: "All sprinkler heads correct type for space (upright, pendant, sidewall)"
    - id: FP-05
