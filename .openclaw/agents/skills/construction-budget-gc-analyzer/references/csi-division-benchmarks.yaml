# CSI MasterFormat Division Cost Benchmarks
# Cost per SF ranges by construction type for major divisions
# All costs in 2025 USD, national average (adjust for local market)

schema:
  version: "1.0"
  cost_basis: "2025 USD per gross SF"
  context: "National average costs. Apply RSMeans City Cost Index for local adjustment."
  adjustment_factors:
    northeast: 1.15-1.35
    southeast: 0.85-0.95
    midwest: 0.90-1.00
    southwest: 0.90-1.00
    west_coast: 1.10-1.30
    nyc_metro: 1.40-1.70
    sf_bay_area: 1.35-1.60
  notes:
    - "Ranges represent low-to-high quality within each construction type"
    - "Excludes land, soft costs, and financing unless noted"
    - "Contingency shown separately; not included in division costs"
    - "FF&E excluded from base building costs"

construction_types:
  multifamily:
    description: "Wood-frame (Type V), 3-5 stories, 80-200 units"
    total_hard_cost_range: "$180-320/SF"
    podium_concrete_add: "$20-40/SF additional for Type I podium"
    high_rise_steel_concrete: "$350-550/SF (Type I, 10+ stories)"

  office:
    description: "Steel or concrete frame, Class A/B, 3-20 stories"
    total_hard_cost_range: "$250-450/SF (mid-rise), $400-650/SF (high-rise)"

  industrial:
    description: "Tilt-up concrete or pre-engineered metal, 1 story"
    total_hard_cost_range: "$80-160/SF (warehouse), $120-220/SF (flex/light industrial)"

divisions:

  division_02_existing_conditions:
    name: "Existing Conditions"
    includes: "Demolition, site remediation, hazmat abatement, dewatering"
    cost_ranges:
      multifamily: "$0.50-5.00/SF"
      office: "$1.00-8.00/SF"
      industrial: "$0.25-3.00/SF"
    notes:
      - "Highly variable -- depends on existing conditions"
      - "Asbestos/lead abatement can add $5-20/SF for renovation"
      - "Soil remediation: $20-100/CY for contaminated soil"

  division_03_concrete:
    name: "Concrete"
    includes: "Foundations, SOG, structural slabs, columns, walls, post-tensioning"
    cost_ranges:
      multifamily:
        wood_frame: "$8-15/SF (foundations and SOG only)"
        podium: "$25-45/SF (podium + above-grade concrete)"
        high_rise: "$45-75/SF"
      office:
        low_rise: "$15-25/SF"
        mid_rise: "$30-50/SF"
        high_rise: "$50-80/SF"
      industrial:
        tilt_up: "$12-22/SF (walls + SOG)"
        warehouse_sog_only: "$6-12/SF"
    benchmarks:
      concrete_cost: "$180-250/CY installed (ready-mix + placement)"
      rebar: "$0.80-1.40/lb installed"
      post_tensioning: "$0.60-1.00/lb of PT strand"
      slab_on_grade: "$6-12/SF (4-6 inch, reinforced)"
      elevated_slab: "$18-30/SF (post-tensioned, 8-10 inch)"

  division_04_masonry:
    name: "Masonry"
    includes: "CMU walls, brick veneer, stone veneer, unit masonry"
    cost_ranges:
      multifamily: "$2-8/SF (exterior veneer application)"
      office: "$3-12/SF"
      industrial: "$1-5/SF (CMU demising walls)"
    benchmarks:
      cmu_wall_8inch: "$12-18/SF of wall area"
      cmu_wall_12inch: "$16-24/SF of wall area"
      brick_veneer: "$18-30/SF of wall area"
      stone_veneer_natural: "$35-65/SF of wall area"
      stone_veneer_manufactured: "$15-28/SF of wall area"

  division_05_metals:
    name: "Metals"
    includes: "Structural steel, metal decking, miscellaneous metals (stairs, railings, lintels)"
    cost_ranges:
      multifamily:
        wood_frame: "$1-4/SF (misc metals only)"
        steel_frame: "$25-45/SF"
      office:
        steel_frame: "$30-55/SF"
        high_rise: "$45-70/SF"
      industrial:
        pre_engineered: "$12-22/SF"
        structural_steel: "$18-35/SF"
    benchmarks:
      structural_steel_erected: "$3,500-5,500/ton installed"
      metal_decking: "$3-6/SF"
      steel_stairs: "$8,000-15,000/flight"
      steel_railings: "$80-200/LF"
      miscellaneous_metals_allowance: "$1-4/SF"

  division_06_wood_plastics_composites:
    name: "Wood, Plastics, and Composites"
    includes: "Rough carpentry, finish carpentry, architectural woodwork, wood framing"
    cost_ranges:
      multifamily:
        wood_frame: "$30-55/SF (primary structural system)"
        podium_above: "$25-45/SF (upper floors only)"
      office: "$2-8/SF (interior millwork, blocking)"
      industrial: "$0.50-3.00/SF (blocking, miscellaneous)"
    benchmarks:
      wood_framing_2x6: "$4-7/SF of wall area"
      engineered_wood_trusses: "$3-6/SF of floor/roof area"
      glulam_beams: "$12-20/BF installed"
      mass_timber_clt: "$25-45/SF (panels installed)"
      architectural_millwork: "$50-200/LF (casework, custom)"

  division_07_thermal_moisture:
    name: "Thermal and Moisture Protection"
    includes: "Waterproofing, insulation, roofing, siding, fireproofing, joint sealants"
    cost_ranges:
      multifamily: "$8-18/SF"
      office: "$8-20/SF"
      industrial: "$4-12/SF"
    benchmarks:
      roofing:
        tpo_single_ply: "$8-14/SF of roof area"
        epdm: "$7-12/SF of roof area"
        modified_bitumen: "$10-16/SF of roof area"
        standing_seam_metal: "$14-25/SF of roof area"
        green_roof_extensive: "$20-35/SF of roof area"
      insulation:
        spray_foam_closed_cell: "$1.50-2.50/SF per inch"
        rigid_board: "$1.00-2.00/SF per inch"
        batt_insulation: "$0.50-1.00/SF per inch"
      waterproofing:
        below_grade: "$8-15/SF of wall area"
        plaza_deck: "$12-22/SF"
      fireproofing:
        sprayed_intumescent: "$3-6/SF of protected area"
        cementitious: "$1.50-3.00/SF"
      cladding_systems:
        fiber_cement: "$12-20/SF of wall area"
        metal_panel: "$20-40/SF of wall area"
        eifs: "$12-22/SF of wall area"

  division_08_openings:
    name: "Openings"
    includes: "Doors, windows, curtain wall, storefronts, hardware"
    cost_ranges:
      multifamily: "$6-15/SF"
      office: "$12-35/SF"
      industrial: "$2-6/SF"
    benchmarks:
      curtain_wall:
        standard_aluminum: "$60-90/SF of wall area"
        high_performance: "$80-130/SF of wall area"
        unitized: "$90-150/SF of wall area"
      storefront: "$45-70/SF of wall area"
      windows:
        vinyl_double_pane: "$25-40/each (residential size)"
        aluminum_double_pane: "$40-70/each"
        triple_pane: "$60-100/each"
      doors:
        hollow_metal_frame_door: "$800-1,500/each"
        wood_interior: "$400-800/each"
        aluminum_entrance: "$3,000-8,000/each"
      hardware_per_door: "$300-800/door (standard), $1,000-3,000 (access control)"

  division_09_finishes:
    name: "Finishes"
    includes: "Drywall, flooring, painting, ceilings, tile, specialties"
    cost_ranges:
      multifamily: "$18-40/SF"
      office:
        shell: "$2-5/SF (core only)"
        turnkey: "$25-60/SF (full fit-out)"
      industrial: "$2-10/SF (office areas only)"
    benchmarks:
      drywall:
        standard_5_8: "$2.50-4.00/SF of wall area"
        fire_rated_type_x: "$3.00-5.00/SF of wall area"
        moisture_resistant: "$3.50-5.50/SF of wall area"
      flooring:
        vct: "$2-4/SF"
        lvt_lvp: "$4-8/SF"
        carpet_tile: "$3-7/SF"
        polished_concrete: "$3-6/SF"
        hardwood: "$8-15/SF"
        porcelain_tile: "$8-18/SF"
        natural_stone: "$15-40/SF"
      ceilings:
        act_2x4_standard: "$3-5/SF"
        act_2x4_premium: "$5-8/SF"
        drywall_ceiling: "$4-7/SF"
        exposed_structure_painted: "$2-4/SF"
      painting:
        standard_2_coat: "$1.00-2.00/SF of wall area"
        premium_3_coat: "$1.50-3.00/SF of wall area"

  division_10_specialties:
    name: "Specialties"
    includes: "Signage, lockers, toilet partitions, fire extinguishers, postal specialties"
    cost_ranges:
      multifamily: "$1-3/SF"
      office: "$1-4/SF"
      industrial: "$0.50-2.00/SF"

  division_14_conveying:
    name: "Conveying Equipment"
    includes: "Elevators, escalators, dumbwaiters"
    cost_ranges:
      multifamily:
        low_rise_no_elevator: "$0/SF"
        mid_rise: "$3-6/SF"
        high_rise: "$8-15/SF"
      office:
        low_rise: "$3-6/SF"
        mid_rise: "$6-12/SF"
        high_rise: "$10-20/SF"
      industrial: "$0-2/SF"
    benchmarks:
      hydraulic_elevator: "$80,000-150,000/cab (2-5 stories)"
      traction_elevator: "$150,000-350,000/cab (5-20 stories)"
      high_speed_traction: "$300,000-600,000/cab (20+ stories)"
      escalator: "$150,000-250,000/each"
      freight_elevator: "$120,000-250,000/cab"
    notes:
      - "Elevator count per ASME/building code based on population and wait time"
      - "Typical: 1 elevator per 40,000-50,000 SF (office)"
      - "Typical: 1 elevator per 60-80 units (multifamily)"

  division_21_fire_suppression:
    name: "Fire Suppression"
    includes: "Sprinkler systems, standpipes, fire pumps"
    cost_ranges:
      multifamily: "$3-6/SF"
      office: "$3-7/SF"
      industrial: "$2-5/SF (ESFR heads for high-pile)"
    benchmarks:
      wet_sprinkler: "$3-5/SF"
      dry_sprinkler: "$4-7/SF"
      fire_pump: "$50,000-150,000/each"
      standpipe: "$15-25/floor"

  division_22_plumbing:
    name: "Plumbing"
    includes: "Domestic water, sanitary, storm, gas piping, fixtures"
    cost_ranges:
      multifamily: "$12-22/SF"
      office: "$6-12/SF"
      industrial: "$2-6/SF"
    benchmarks:
      per_fixture_rough_in: "$1,500-3,500/fixture"
      water_heater_commercial: "$15,000-50,000/each"
      domestic_booster_pump: "$10,000-30,000/each"
    notes: "Multifamily highest due to per-unit kitchens and bathrooms"

  division_23_hvac:
    name: "HVAC"
    includes: "Heating, ventilation, air conditioning, controls, testing/balancing"
    cost_ranges:
      multifamily:
        split_systems: "$10-18/SF"
        central_plant: "$18-30/SF"
        vrf: "$20-35/SF"
      office:
        vav_rooftop: "$18-28/SF"
        central_plant: "$25-45/SF"
        underfloor_air: "$30-50/SF"
      industrial:
        warehouse_heating: "$3-8/SF"
        office_portion: "$15-25/SF"
    benchmarks:
      chiller_centrifugal: "$400-800/ton"
      chiller_air_cooled: "$600-1,200/ton"
      boiler_hot_water: "$30-60/MBH"
      rooftop_unit: "$3,000-6,000/ton"
      split_system: "$2,500-5,000/ton"
      vrf_system: "$6,000-10,000/ton"
      cooling_tower: "$200-500/ton"
      ductwork: "$3-6/lb installed"
      bms_controls: "$2-5/SF"

  division_26_electrical:
    name: "Electrical"
    includes: "Power distribution, lighting, branch wiring, low voltage rough-in"
    cost_ranges:
      multifamily: "$10-20/SF"
      office: "$15-30/SF"
      industrial: "$6-14/SF"
    benchmarks:
      switchgear: "$40,000-150,000/unit"
      transformer_dry: "$15,000-50,000/each"
      generator_diesel: "$400-800/kW"
      led_lighting: "$2-5/SF (fixtures + wiring)"
      branch_wiring: "$3-6/SF"
      electrical_room_equipment: "$80-200/amp"

  division_27_communications:
    name: "Communications"
    includes: "Structured cabling, telecom rooms, distributed antenna (DAS)"
    cost_ranges:
      multifamily: "$1-3/SF"
      office: "$3-8/SF"
      industrial: "$0.50-2.00/SF"
    benchmarks:
      cat6a_per_drop: "$200-400/drop"
      fiber_backbone: "$3-8/LF"
      telecom_room: "$15,000-40,000/room"
      das_system: "$2-5/SF"

  division_28_electronic_safety:
    name: "Electronic Safety and Security"
    includes: "Fire alarm, security, access control, CCTV"
    cost_ranges:
      multifamily: "$2-5/SF"
      office: "$3-7/SF"
      industrial: "$1-3/SF"
    benchmarks:
      fire_alarm_system: "$2-4/SF"
      access_control_per_door: "$2,000-5,000/door"
      cctv_camera: "$1,500-4,000/camera installed"
      security_monitoring: "$200-500/month"

# Soft Cost Benchmarks (% of hard cost)
soft_costs:
  architecture_engineering: "6-10%"
  permits_fees: "2-5%"
  legal: "1-2%"
  insurance_builders_risk: "0.5-1.5%"
  testing_inspections: "0.5-1.5%"
  project_management: "2-4%"
  accounting: "0.5-1%"
  marketing_lease_up: "1-3% (multifamily/office)"
  financing_costs: "2-4% (interest carry during construction)"
  developer_fee: "3-5%"
  total_soft_costs: "20-35% of hard costs"

# Contingency Benchmarks
contingency:
  design_contingency:
    schematic_design: "15-20%"
    design_development: "10-15%"
    construction_documents: "5-10%"
  construction_contingency:
    new_construction: "5-8%"
    renovation_known_conditions: "8-12%"
    renovation_unknown_conditions: "12-20%"
  owner_contingency: "3-5% (held separately from GC contingency)"
