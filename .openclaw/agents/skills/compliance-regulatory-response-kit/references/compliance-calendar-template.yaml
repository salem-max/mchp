    - "HVAC seasonal transition (heating to cooling prep)"
    - "Stormwater permit quarterly inspection"
  april:
    - "Backflow preventer testing"
    - "Window washing (spring, office)"
    - "Parking lot striping"
    - "Pool season preparation (multifamily)"
  may:
    - "Cooling tower startup and treatment"
    - "Indoor air quality testing (office)"
  june:
    - "Fire drill (Q2 for high-rise)"
    - "Elevator annual inspection"
    - "Stormwater permit quarterly inspection"
  july:
    - "Fire alarm semi-annual inspection"
    - "Insurance certificate mid-year audit"
  august:
    - "Pre-cooling season HVAC verification"
  september:
    - "Fire drill (Q3 for high-rise)"
    - "Boiler annual inspection (pre-heating season)"
    - "Smoke/CO detector testing (multifamily)"
    - "Stormwater permit quarterly inspection"
  october:
    - "Cooling tower winterization"
    - "Window washing (fall, office)"
    - "Heating system startup"
  november:
    - "Insurance policy renewal (typical)"
    - "Budget compliance costs for next year"
  december:
    - "Fire drill (Q4 for high-rise)"
    - "HVAC filter change (quarterly)"
    - "Year-end compliance audit across portfolio"
    - "Stormwater permit quarterly inspection"
