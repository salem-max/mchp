---

# Incident Reporting Framework
incident_reporting:
  severity_levels:
    near_miss:
      definition: "Event that could have resulted in injury or property damage but did not"
      notification_timeline: "Report to site superintendent within 2 hours"
      investigation_required: true
      investigation_deadline: "5 business days"
      osha_reportable: false

    first_aid:
      definition: "Injury requiring only first aid treatment (band-aid, ice, OTC medication)"
      notification_timeline: "Report to site superintendent immediately, safety officer within 4 hours"
      investigation_required: true
      investigation_deadline: "3 business days"
      osha_reportable: false
      osha_recordable: false

    recordable:
      definition: "Injury requiring medical treatment beyond first aid, restricted duty, or days away from work"
      notification_timeline: "Report to site superintendent immediately, safety officer within 1 hour, owner within 4 hours"
      investigation_required: true
      investigation_deadline: "48 hours"
      osha_reportable: false  # unless hospitalization
      osha_recordable: true
      osha_300_log: true

    lost_time:
      definition: "Injury resulting in one or more days away from work beyond the day of injury"
      notification_timeline: "Report to site superintendent immediately, safety officer within 1 hour, owner within 2 hours"
      investigation_required: true
      investigation_deadline: "24 hours"
      osha_reportable: false  # unless hospitalization
      osha_recordable: true
      osha_300_log: true

    hospitalization:
      definition: "In-patient hospitalization, amputation, or loss of an eye"
      notification_timeline: "Report to OSHA within 24 hours (call 1-800-321-OSHA or online)"
      investigation_required: true
      investigation_deadline: "24 hours"
      osha_reportable: true
      reporting_deadline_hours: 24

    fatality:
      definition: "Death of any worker on the project"
      notification_timeline: "Report to OSHA within 8 hours"
      investigation_required: true
      investigation_deadline: "Immediate"
      osha_reportable: true
      reporting_deadline_hours: 8
      additional_notifications:
        - "Local law enforcement"
        - "Owner/developer immediately"
        - "Construction lender immediately"
        - "Insurance carrier immediately"
        - "Legal counsel immediately"

  root_cause_analysis:
    methodology: "5-Why analysis"
    template:
      incident_description: ""
      immediate_cause: ""
      why_1: ""
      why_2: ""
      why_3: ""
      why_4: ""
      why_5: ""
      root_cause: ""
      corrective_actions:
        - action: ""
          responsible_party: ""
          deadline: ""
          verification_method: ""

  safety_metrics:
    total_recordable_incident_rate:
      formula: "(recordable_incidents x 200,000) / total_hours_worked"
      industry_average_construction: 2.8
      target: 1.5
      note: "200,000 represents 100 full-time workers x 2,000 hours/year"

    lost_time_incident_rate:
      formula: "(lost_time_incidents x 200,000) / total_hours_worked"
      industry_average_construction: 1.1
      target: 0.5

    days_away_restricted_transferred:
      formula: "(DART_incidents x 200,000) / total_hours_worked"
      industry_average_construction: 1.6
      target: 0.8

    experience_modification_rate:
      description: "Workers comp modifier based on 3-year claims history"
      baseline: 1.00
      good: "< 0.85"
      poor: "> 1.20"
      note: "Verify GC and all major subs have EMR < 1.00 as a condition of contract"

---

# Subcontractor Safety Compliance Requirements
subcontractor_compliance:
  pre_mobilization:
    - item: "Written safety program on file"
      required: true
    - item: "Competent person designated for each trade"
      required: true
    - item: "EMR verification (< 1.00 required, < 1.20 conditional)"
      required: true
    - item: "OSHA 30-hour certification for superintendent"
      required: true
    - item: "OSHA 10-hour certification for all workers"
      required: true
    - item: "Workers compensation insurance certificate"
      required: true
    - item: "General liability insurance certificate (naming owner/GC as additional insured)"
      required: true
    - item: "Auto insurance certificate"
      required: true
    - item: "Drug and alcohol testing program documentation"
      required: true
    - item: "Trade-specific safety certifications"
      required: true
      examples:
        - "Crane operator: NCCCO certification"
        - "Welder: AWS certification"
        - "Electrician: state license"
        - "Plumber: state license"

  ongoing:
    - item: "Attend weekly toolbox talks"
      frequency: "weekly"
    - item: "Participate in monthly safety audits"
      frequency: "monthly"
    - item: "Maintain insurance certificates (no lapses)"
      frequency: "continuous"
    - item: "Report all incidents within required timeframes"
      frequency: "per event"
    - item: "Correct safety violations within 24 hours of notice"
      frequency: "per event"

  enforcement:
    first_violation:
      action: "Written warning to subcontractor with corrective action and 24-hour deadline"
    second_violation:
      action: "Formal notice of non-compliance, meeting with sub principal, 48-hour cure period"
    third_violation:
      action: "Suspension from site pending safety stand-down and corrective action plan"
    pattern_violations:
      action: "Default notice per subcontract, potential termination for cause"
    imminent_danger:
      action: "Immediate stop-work order for affected area. No notice required. Resume only after competent person certifies safe conditions."
