---

# Weekly Toolbox Talk Template
weekly_toolbox_talk:
  header:
    project_name: ""
    date: ""
    topic: ""
    presenter: ""
    duration_minutes: 15  # minimum

  # Rotate through these topics monthly
  annual_topic_calendar:
    january:
      - "Cold weather hazards and hypothermia prevention"
      - "Winter driving safety for site vehicles"
    february:
      - "Scaffolding safety (29 CFR 1926.451)"
      - "Ladder safety and three-point contact"
    march:
      - "Excavation and trenching (29 CFR 1926.650-652)"
      - "Soil classification and protective systems"
    april:
      - "Fall protection (29 CFR 1926.500-503)"
      - "Personal fall arrest system inspection"
    may:
      - "Electrical safety and lockout/tagout (29 CFR 1926.405)"
      - "GFCIs and assured equipment grounding"
    june:
      - "Heat illness prevention"
      - "Hydration and work-rest cycles"
    july:
      - "Crane and rigging safety (29 CFR 1926.1400-1442)"
      - "Signal person qualifications"
    august:
      - "Confined space entry (29 CFR 1926.1200)"
      - "Atmospheric testing and rescue plans"
    september:
      - "Fire prevention and extinguisher use"
      - "Hot work procedures and fire watch"
    october:
      - "Silica dust exposure (29 CFR 1926.1153)"
      - "Respiratory protection program"
    november:
      - "Housekeeping and material storage"
      - "Struck-by hazard awareness"
    december:
      - "Year-end safety review and lessons learned"
      - "Emergency action plan review"

  attendance:
    - name: ""
      employer: ""
      signature: ""
    # minimum attendance: all workers on site that day

  discussion_points: []
  questions_raised: []
  follow_up_items: []

